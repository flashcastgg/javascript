<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JavaScript Mastery — The Complete Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f9fb;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --border: #e5e5ea;
    --text: #1c1c1e;
    --text-2: #3a3a3c;
    --text-3: #8e8e93;
    --yellow: #ffd60a;
    --yellow-soft: #fff9e6;
    --yellow-border: #ffe066;
    --blue: #0071e3;
    --blue-soft: #e8f1fc;
    --blue-border: #aecbf5;
    --green: #30d158;
    --green-soft: #eafaf0;
    --green-border: #a8edbe;
    --purple: #bf5af2;
    --purple-soft: #f5eafd;
    --purple-border: #dbb4f7;
    --orange: #ff9f0a;
    --orange-soft: #fff3e0;
    --orange-border: #ffd080;
    --pink: #ff375f;
    --pink-soft: #ffeaee;
    --pink-border: #ffafc0;
    --teal: #32ade6;
    --teal-soft: #e5f5fd;
    --teal-border: #a3d9f7;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
    --font: 'DM Sans', -apple-system, sans-serif;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    --sidebar-width: 280px;
    --header-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(249,249,251,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 14px;
    z-index: 1000;
  }
  #menu-btn {
    display: flex; flex-direction: column;
    gap: 5px; cursor: pointer; padding: 4px;
    background: none; border: none;
  }
  #menu-btn span {
    display: block; width: 22px; height: 2px;
    background: var(--text); border-radius: 2px;
    transition: all 0.3s ease;
  }
  #menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
  #menu-btn.open span:nth-child(2) { opacity: 0; }
  #menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

  .logo {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-display);
    font-size: 18px; color: var(--text);
    text-decoration: none;
  }
  .logo-badge {
    background: var(--yellow);
    color: #1c1c1e;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    padding: 3px 7px; border-radius: 6px;
    letter-spacing: 0.5px;
  }
  #header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .progress-ring-wrap { position: relative; width: 36px; height: 36px; }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .progress-ring-fg { fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .progress-pct {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 9px; font-weight: 600; color: var(--blue);
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 999;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    padding-top: var(--header-h);
    -webkit-overflow-scrolling: touch;
  }
  #sidebar.open { transform: translateX(0); }
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(2px);
    z-index: 998;
  }
  #overlay.show { display: block; }

  .sidebar-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .sidebar-section:last-child { border-bottom: none; }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--text-3); text-transform: uppercase;
    padding: 8px 20px 4px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--text-2);
    transition: background 0.15s, color 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--blue-soft); color: var(--blue); }
  .sidebar-item.done .si-icon { background: var(--green-soft); color: var(--green); }
  .si-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    background: var(--surface2);
  }
  .sidebar-item.active .si-icon { background: var(--blue); color: white; }

  /* ─── MAIN ─── */
  #main {
    padding-top: var(--header-h);
    min-height: 100vh;
  }

  /* ─── HERO ─── */
  #hero {
    background: linear-gradient(160deg, #fff9e6 0%, #eaf4ff 50%, #f5eafd 100%);
    padding: 48px 24px 56px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--yellow-soft);
    border: 1px solid var(--yellow-border);
    color: #8a6700;
    font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 100px;
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }
  #hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 8vw, 42px);
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 14px;
  }
  #hero h1 em { font-style: italic; color: var(--blue); }
  #hero p {
    color: var(--text-2); font-size: 16px; max-width: 440px;
    margin: 0 auto 28px; line-height: 1.65;
  }
  .hero-stats {
    display: flex; justify-content: center; gap: 24px;
    flex-wrap: wrap;
  }
  .hero-stat {
    display: flex; flex-direction: column; align-items: center;
  }
  .hero-stat strong { font-size: 22px; font-weight: 700; color: var(--text); }
  .hero-stat span { font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.3px; }

  /* ─── CURRICULUM GRID ─── */
  #curriculum {
    padding: 32px 20px;
    max-width: 800px; margin: 0 auto;
  }
  .section-header {
    margin-bottom: 20px;
  }
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text-3); text-transform: uppercase; margin-bottom: 6px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 24px; color: var(--text);
  }

  .track-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .track-card:hover { box-shadow: var(--shadow-md); }
  .track-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .track-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .track-meta { flex: 1; min-width: 0; }
  .track-meta strong { font-size: 15px; font-weight: 600; display: block; }
  .track-meta span { font-size: 12px; color: var(--text-3); }
  .track-chevron {
    font-size: 12px; color: var(--text-3);
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }
  .track-card.open .track-chevron { transform: rotate(90deg); }
  .track-topics { display: none; border-top: 1px solid var(--border); }
  .track-card.open .track-topics { display: block; }
  .topic-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 13px 20px;
    border: none; background: none; text-align: left;
    cursor: pointer; border-bottom: 1px solid var(--border);
    font-family: var(--font); font-size: 14px; font-weight: 500;
    color: var(--text-2); transition: background 0.15s;
  }
  .topic-btn:last-child { border-bottom: none; }
  .topic-btn:hover { background: var(--surface2); color: var(--text); }
  .topic-btn.done { color: var(--text-3); }
  .topic-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 10px;
    transition: all 0.2s;
  }
  .topic-btn.done .topic-check {
    background: var(--green); border-color: var(--green); color: white;
  }
  .topic-tag {
    margin-left: auto; font-size: 10px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
  }

  /* ─── LESSON VIEW ─── */
  #lesson-view {
    display: none;
    padding: 0 0 80px;
    max-width: 800px; margin: 0 auto;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  #lesson-view.show { display: block; }
  #curriculum.hidden { display: none; }

  .lesson-breadcrumb {
    padding: 16px 20px 0;
    font-size: 12px; color: var(--text-3);
    display: flex; align-items: center; gap: 6px;
  }
  .lesson-breadcrumb button {
    background: none; border: none; cursor: pointer;
    color: var(--blue); font-size: 12px; font-family: var(--font);
    padding: 0; font-weight: 500;
  }

  .lesson-hero {
    padding: 24px 20px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .lesson-track-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 8px;
    margin-bottom: 12px;
  }
  .lesson-hero h2 {
    font-family: var(--font-display);
    font-size: clamp(22px, 6vw, 30px);
    color: var(--text); margin-bottom: 8px;
    line-height: 1.2;
  }
  .lesson-hero p {
    color: var(--text-2); font-size: 15px; line-height: 1.6;
  }
  .lesson-meta-row {
    display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap;
  }
  .lesson-meta-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-3); font-weight: 500;
  }

  /* Content blocks */
  .lesson-body { padding: 24px 20px; }
  .lesson-body h3 {
    font-family: var(--font-display);
    font-size: 20px; color: var(--text);
    margin: 32px 0 12px;
  }
  .lesson-body h3:first-child { margin-top: 0; }
  .lesson-body h4 {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin: 24px 0 8px;
  }
  .lesson-body p {
    color: var(--text-2); font-size: 15px; line-height: 1.7;
    margin-bottom: 14px;
  }
  .lesson-body ul, .lesson-body ol {
    color: var(--text-2); font-size: 15px;
    padding-left: 20px; margin-bottom: 14px; line-height: 1.7;
  }
  .lesson-body li { margin-bottom: 6px; }
  .lesson-body code {
    font-family: var(--font-mono);
    font-size: 13px; background: var(--surface2);
    padding: 2px 6px; border-radius: 5px; color: var(--blue);
  }

  /* Code blocks */
  .code-block {
    background: #1c1c1e;
    border-radius: var(--radius-sm);
    margin: 16px 0;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .code-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: #2c2c2e;
  }
  .code-lang { font-size: 11px; color: #8e8e93; font-family: var(--font-mono); font-weight: 500; }
  .code-dots { display: flex; gap: 6px; }
  .code-dots span { width: 10px; height: 10px; border-radius: 50%; }
  .code-dots span:nth-child(1) { background: #ff5f57; }
  .code-dots span:nth-child(2) { background: #febc2e; }
  .code-dots span:nth-child(3) { background: #28c840; }
  .code-copy {
    font-size: 11px; font-family: var(--font); color: #8e8e93;
    background: none; border: none; cursor: pointer; padding: 0;
    transition: color 0.2s;
  }
  .code-copy:hover { color: white; }
  .code-block pre {
    padding: 16px; overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 13px; line-height: 1.65;
    color: #f0f0f0;
    -webkit-overflow-scrolling: touch;
  }
  .code-block pre .kw { color: #ff79c6; }
  .code-block pre .str { color: #f1fa8c; }
  .code-block pre .num { color: #bd93f9; }
  .code-block pre .fn { color: #50fa7b; }
  .code-block pre .cmt { color: #6272a4; font-style: italic; }
  .code-block pre .var { color: #8be9fd; }
  .code-block pre .op { color: #ff79c6; }
  .code-block pre .obj { color: #ffb86c; }

  /* Callouts */
  .callout {
    border-radius: var(--radius-sm);
    padding: 14px 16px; margin: 16px 0;
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 14px; line-height: 1.6;
  }
  .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .callout-body strong { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
  .callout.tip { background: var(--green-soft); border: 1px solid var(--green-border); color: #1a5c34; }
  .callout.warn { background: var(--orange-soft); border: 1px solid var(--orange-border); color: #7a4600; }
  .callout.info { background: var(--blue-soft); border: 1px solid var(--blue-border); color: #003b82; }
  .callout.best { background: var(--purple-soft); border: 1px solid var(--purple-border); color: #5e1a8c; }

  /* Practice */
  .practice-box {
    background: var(--yellow-soft);
    border: 1px solid var(--yellow-border);
    border-radius: var(--radius-sm);
    padding: 18px 20px; margin: 24px 0;
  }
  .practice-box h4 { color: #7a5800; font-size: 14px; margin-bottom: 8px; }
  .practice-box p { color: #5a4000; font-size: 14px; margin-bottom: 8px; }
  .practice-box code { background: rgba(0,0,0,0.07); color: #5a4000; }

  /* Nav */
  .lesson-nav {
    display: flex; gap: 12px;
    padding: 0 20px; margin-top: 32px;
  }
  .btn-nav {
    flex: 1; padding: 14px 16px;
    border: 1px solid var(--border); background: var(--surface);
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    color: var(--text); text-align: center;
    transition: all 0.2s;
  }
  .btn-nav:hover { border-color: var(--blue); color: var(--blue); }
  .btn-nav.primary {
    background: var(--blue); color: white; border-color: var(--blue);
  }
  .btn-nav.primary:hover { background: #005ec9; }
  .btn-done {
    display: block; width: calc(100% - 40px); margin: 16px 20px 0;
    padding: 14px; border-radius: var(--radius-sm);
    background: var(--green-soft); border: 1px solid var(--green-border);
    color: #1a5c34; font-family: var(--font); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-done:hover { background: var(--green); color: white; border-color: var(--green); }
  .btn-done.done { background: var(--green); color: white; border-color: var(--green); }

  /* Comparison table */
  .compare-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
  .compare-table th, .compare-table td {
    padding: 10px 12px; border: 1px solid var(--border); text-align: left;
  }
  .compare-table th { background: var(--surface2); font-weight: 600; font-size: 13px; }
  .compare-table tr:nth-child(even) td { background: #fafafa; }

  /* Scrollbar */
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── RESPONSIVE ─── */
  @media (min-width: 768px) {
    #sidebar {
      transform: translateX(0);
      top: var(--header-h);
    }
    #menu-btn { display: none; }
    #overlay { display: none !important; }
    #main {
      margin-left: var(--sidebar-width);
    }
    #curriculum, #lesson-view { max-width: none; padding: 40px 48px; }
    .lesson-body { padding: 28px 48px; }
    .lesson-hero { padding: 32px 48px 28px; }
    .lesson-breadcrumb { padding: 20px 48px 0; }
    .lesson-nav { padding: 0 48px; }
    .btn-done { width: calc(100% - 96px); margin: 16px 48px 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <button id="menu-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <a class="logo" href="#">
    <span class="logo-badge">JS</span>
    <span>Mastery</span>
  </a>
  <div id="header-right">
    <div class="progress-ring-wrap">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <circle class="progress-ring-bg" cx="18" cy="18" r="14"/>
        <circle class="progress-ring-fg" cx="18" cy="18" r="14" id="progress-circle"
          stroke-dasharray="87.96"
          stroke-dashoffset="87.96"/>
      </svg>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
  </div>
</header>

<!-- SIDEBAR -->
<nav id="sidebar"></nav>
<div id="overlay"></div>

<!-- MAIN -->
<main id="main">
  <!-- HERO -->
  <section id="hero">
    <div class="hero-tag">🎓 Complete Curriculum · Beginner to Advanced</div>
    <h1>Master <em>JavaScript</em><br>from Zero to Pro</h1>
    <p>A structured, Udemy-style playbook covering everything — foundations, modern ES6+, async, DOM, APIs, patterns, and best practices. Your forever reference.</p>
    <div class="hero-stats">
      <div class="hero-stat"><strong>12</strong><span>MODULES</span></div>
      <div class="hero-stat"><strong>60+</strong><span>TOPICS</span></div>
      <div class="hero-stat"><strong>200+</strong><span>EXAMPLES</span></div>
      <div class="hero-stat"><strong>∞</strong><span>REFERENCE</span></div>
    </div>
  </section>

  <!-- CURRICULUM / LESSON -->
  <div id="curriculum"></div>
  <div id="lesson-view"></div>
</main>

<script>
// ═══════════════════════════════════════════
//  DATA: CURRICULUM
// ═══════════════════════════════════════════
const CURRICULUM = [
  {
    id: 'foundations',
    title: 'Foundations',
    icon: '🧱',
    color: 'yellow',
    topics: [
      { id: 'what-is-js', title: 'What is JavaScript?', tag: 'Intro' },
      { id: 'variables', title: 'Variables: var, let & const', tag: 'Core' },
      { id: 'datatypes', title: 'Data Types & typeof', tag: 'Core' },
      { id: 'operators', title: 'Operators & Expressions', tag: 'Core' },
      { id: 'type-coercion', title: 'Type Coercion & Comparison', tag: 'Core' },
    ]
  },
  {
    id: 'control-flow',
    title: 'Control Flow',
    icon: '🔀',
    color: 'blue',
    topics: [
      { id: 'conditionals', title: 'if / else / switch', tag: 'Core' },
      { id: 'loops', title: 'Loops: for, while, do-while', tag: 'Core' },
      { id: 'break-continue', title: 'break, continue & labeled', tag: 'Core' },
      { id: 'error-handling', title: 'try / catch / finally', tag: 'Core' },
    ]
  },
  {
    id: 'functions',
    title: 'Functions',
    icon: '⚙️',
    color: 'green',
    topics: [
      { id: 'fn-basics', title: 'Function Declarations & Expressions', tag: 'Core' },
      { id: 'arrow-fns', title: 'Arrow Functions', tag: 'ES6' },
      { id: 'scope', title: 'Scope, Hoisting & Closures', tag: 'Deep' },
      { id: 'higher-order', title: 'Higher-Order Functions', tag: 'Deep' },
      { id: 'params', title: 'Rest, Spread & Default Params', tag: 'ES6' },
    ]
  },
  {
    id: 'objects',
    title: 'Objects & Arrays',
    icon: '📦',
    color: 'orange',

      <h3>What is JavaScript?</h3>
      <p>JavaScript (JS) is the only programming language that runs natively in every web browser. It was created by Brendan Eich in 1995 in just 10 days — and it has since become one of the most widely-used programming languages on Earth.</p>
      <p>It started as a tool to add interactivity to web pages (things like "click this button, show a popup"). Today, JavaScript runs:</p>
      <ul>
        <li>In your browser (frontend — React, Vue, plain JS)</li>
        <li>On servers (backend — Node.js)</li>
        <li>In mobile apps (React Native, Ionic)</li>
        <li>In desktop apps (Electron)</li>
        <li>In cloud functions, CLIs, and even databases</li>
      </ul>

      <h3>How Does JavaScript Run?</h3>
      <p>When you open a web page, the browser downloads the HTML, CSS, and JavaScript. It then runs the JS through a <strong>JavaScript Engine</strong> — a program that reads and executes JS code.</p>
      <p>Google Chrome uses <strong>V8</strong>, Firefox uses <strong>SpiderMonkey</strong>, and Safari uses <strong>JavaScriptCore</strong>. Node.js also uses V8, which is why server-side JS is possible.</p>

      <div class="callout info">
        <div class="callout-icon">💡</div>
        <div class="callout-body"><strong>KEY CONCEPT</strong> JavaScript is <em>interpreted</em> (or more accurately, JIT-compiled). Your code is not converted to a binary file ahead of time — the engine reads it as-is and compiles on the fly during execution.</div>
      </div>

      <h3>The Holy Trinity of the Web</h3>
      <p>There are 3 core technologies that every web page is built with:</p>
      <ul>
        <li><strong>HTML</strong> — Structure. The bones of the page.</li>
        <li><strong>CSS</strong> — Style. The looks and layout.</li>
        <li><strong>JavaScript</strong> — Behavior. The interactivity and logic.</li>
      </ul>

      <h3>Your First JavaScript Program</h3>
      <p>Here's how you write and run your very first JS program. Open your browser's Developer Tools (press <code>F12</code> or <code>Cmd+Option+I</code>), go to the <strong>Console</strong> tab, and type:</p>
      <div class="code-block">

        <pre><span class="cmt">// This is a comment — it's ignored by JS</span>
<span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Hello, World!"</span>);

<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">2</span> <span class="op">+</span> <span class="num">2</span>); <span class="cmt">// 4</span>

<span class="cmt">// You can work with text</span>
<span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"My name is Flashcast"</span>);</pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Use <code>console.log()</code> constantly while learning. It's your number-one tool for seeing what your code is doing. Never guess — log it out.</div>

      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">html</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>

<span class="cmt">&lt;!-- OPTION 2: External file (best practice ✅) --&gt;</span>

<span class="cmt">// BUT: objects and arrays can still be mutated!</span>
