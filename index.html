  'array-iteration': {
    title: 'map, filter, reduce, find',
    subtitle: 'The four most important array methods in JavaScript — functional data transformation.',
    duration: '35 min', level: 'Intermediate',
    content: `
      <h3>The Philosophy</h3>
      <p>These methods transform arrays without mutating the original. They're the functional programming toolkit of JS, and once you master them, you'll use them every day.</p>

      <h3>map() — Transform Every Item</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">prices</span> <span class="op">=</span> [<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>];

<span class="cmt">// Apply 10% discount to all prices</span>
<span class="kw">const</span> <span class="var">discounted</span> <span class="op">=</span> <span class="var">prices</span>.<span class="fn">map</span>(<span class="var">price</span> <span class="op">=&gt;</span> <span class="var">price</span> <span class="op">*</span> <span class="num">0.9</span>);
<span class="cmt">// [9, 18, 27]</span>

<span class="kw">const</span> <span class="var">users</span> <span class="op">=</span> [{ <span class="obj">id</span>: <span class="num">1</span>, <span class="obj">name</span>: <span class="str">"Dan"</span> }, { <span class="obj">id</span>: <span class="num">2</span>, <span class="obj">name</span>: <span class="str">"Ana"</span> }];
<span class="kw">const</span> <span class="var">names</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">map</span>(<span class="var">user</span> <span class="op">=&gt;</span> <span class="var">user</span>.<span class="obj">name</span>);
<span class="cmt">// ["Dan", "Ana"]</span></pre>
      </div>

      <h3>filter() — Keep Only Matching Items</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">scores</span> <span class="op">=</span> [<span class="num">45</span>, <span class="num">82</span>, <span class="num">91</span>, <span class="num">30</span>, <span class="num">76</span>];

<span class="kw">const</span> <span class="var">passing</span> <span class="op">=</span> <span class="var">scores</span>.<span class="fn">filter</span>(<span class="var">score</span> <span class="op">=&gt;</span> <span class="var">score</span> <span class="op">>=</span> <span class="num">75</span>);
<span class="cmt">// [82, 91, 76]</span>

<span class="kw">const</span> <span class="var">activeUsers</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">filter</span>(<span class="var">u</span> <span class="op">=&gt;</span> <span class="var">u</span>.<span class="obj">isActive</span> <span class="op">&&</span> <span class="op">!</span><span class="var">u</span>.<span class="obj">isBanned</span>);</pre>
      </div>

      <h3>reduce() — Collapse to a Single Value</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">cart</span> <span class="op">=</span> [
  { <span class="obj">item</span>: <span class="str">"Book"</span>, <span class="obj">price</span>: <span class="num">15</span> },
  { <span class="obj">item</span>: <span class="str">"Pen"</span>, <span class="obj">price</span>: <span class="num">3</span> },
  { <span class="obj">item</span>: <span class="str">"Notebook"</span>, <span class="obj">price</span>: <span class="num">8</span> }
];

<span class="kw">const</span> <span class="var">total</span> <span class="op">=</span> <span class="var">cart</span>.<span class="fn">reduce</span>((<span class="var">sum</span>, <span class="var">item</span>) <span class="op">=&gt;</span> <span class="var">sum</span> <span class="op">+</span> <span class="var">item</span>.<span class="obj">price</span>, <span class="num">0</span>);
<span class="cmt">// 26</span>

<span class="cmt">// Grouping with reduce</span>
<span class="kw">const</span> <span class="var">byCategory</span> <span class="op">=</span> <span class="var">items</span>.<span class="fn">reduce</span>((<span class="var">acc</span>, <span class="var">item</span>) <span class="op">=&gt;</span> {
  <span class="kw">const</span> <span class="var">cat</span> <span class="op">=</span> <span class="var">item</span>.<span class="obj">category</span>;
  <span class="kw">if</span> (<span class="op">!</span><span class="var">acc</span>[<span class="var">cat</span>]) <span class="var">acc</span>[<span class="var">cat</span>] <span class="op">=</span> [];
  <span class="var">acc</span>[<span class="var">cat</span>].<span class="fn">push</span>(<span class="var">item</span>);
  <span class="kw">return</span> <span class="var">acc</span>;
}, {});</pre>
      </div>

      <h3>find() & findIndex()</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">users</span> <span class="op">=</span> [{ <span class="obj">id</span>: <span class="num">1</span>, <span class="obj">name</span>: <span class="str">"Dan"</span> }, { <span class="obj">id</span>: <span class="num">2</span>, <span class="obj">name</span>: <span class="str">"Ana"</span> }];

<span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">find</span>(<span class="var">u</span> <span class="op">=&gt;</span> <span class="var">u</span>.<span class="obj">id</span> <span class="op">===</span> <span class="num">2</span>);
<span class="cmt">// { id: 2, name: "Ana" } — returns the item or undefined</span>

<span class="kw">const</span> <span class="var">idx</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">findIndex</span>(<span class="var">u</span> <span class="op">=&gt;</span> <span class="var">u</span>.<span class="obj">id</span> <span class="op">===</span> <span class="num">2</span>);
<span class="cmt">// 1 — returns the index or -1</span>

<span class="cmt">// some() — does any item match?</span>
<span class="var">users</span>.<span class="fn">some</span>(<span class="var">u</span> <span class="op">=&gt;</span> <span class="var">u</span>.<span class="obj">isAdmin</span>); <span class="cmt">// true or false</span>

<span class="cmt">// every() — do ALL items match?</span>
<span class="var">scores</span>.<span class="fn">every</span>(<span class="var">s</span> <span class="op">=&gt;</span> <span class="var">s</span> <span class="op">>=</span> <span class="num">75</span>); <span class="cmt">// true if all passing</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE: Chain them!</strong> These methods are designed to chain. But only chain when it's readable. If the chain becomes too long, break it into named steps: <code>const filtered = arr.filter(...); const mapped = filtered.map(...);</code> Named steps are self-documenting.</div>
      </div>
    `
  },
  'debounce-throttle': {
    title: 'Debounce & Throttle',
    subtitle: 'Control how often a function runs — critical for performance with scroll and input events.',
    duration: '25 min', level: 'Intermediate',
    content: `
      <h3>The Problem</h3>
      <p>Some events fire hundreds of times per second: window scroll, resize, typing. If you run expensive code on every event, your app slows to a crawl. Debounce and throttle are the solutions.</p>

      <h3>Debounce — Wait Until They Stop</h3>
      <p>Debounce delays the function until after the user stops triggering the event. Perfect for search inputs — don't hit the API on every keystroke.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">function</span> <span class="fn">debounce</span>(<span class="var">fn</span>, <span class="var">delay</span>) {
  <span class="kw">let</span> <span class="var">timer</span>;
  <span class="kw">return function</span>(...<span class="var">args</span>) {
    <span class="fn">clearTimeout</span>(<span class="var">timer</span>);
    <span class="var">timer</span> <span class="op">=</span> <span class="fn">setTimeout</span>(() <span class="op">=&gt;</span> <span class="var">fn</span>.<span class="fn">apply</span>(<span class="kw">this</span>, <span class="var">args</span>), <span class="var">delay</span>);
  };
}

<span class="cmt">// Usage: fire API call 500ms after user stops typing</span>
<span class="kw">const</span> <span class="var">searchInput</span> <span class="op">=</span> <span class="var">document</span>.<span class="fn">getElementById</span>(<span class="str">'search'</span>);
<span class="var">searchInput</span>.<span class="fn">addEventListener</span>(<span class="str">'input'</span>, <span class="fn">debounce</span>(<span class="kw">function</span>(<span class="var">e</span>) {
  <span class="fn">searchAPI</span>(<span class="var">e</span>.<span class="obj">target</span>.<span class="obj">value</span>);
}, <span class="num">500</span>));</pre>
      </div>

      <h3>Throttle — Limit Rate</h3>
      <p>Throttle ensures a function fires at most once per interval. Perfect for scroll events — fire at most once every 100ms.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">function</span> <span class="fn">throttle</span>(<span class="var">fn</span>, <span class="var">limit</span>) {
  <span class="kw">let</span> <span class="var">inThrottle</span> <span class="op">=</span> <span class="kw">false</span>;
  <span class="kw">return function</span>(...<span class="var">args</span>) {
    <span class="kw">if</span> (<span class="op">!</span><span class="var">inThrottle</span>) {
      <span class="var">fn</span>.<span class="fn">apply</span>(<span class="kw">this</span>, <span class="var">args</span>);
      <span class="var">inThrottle</span> <span class="op">=</span> <span class="kw">true</span>;
      <span class="fn">setTimeout</span>(() <span class="op">=&gt;</span> <span class="var">inThrottle</span> <span class="op">=</span> <span class="kw">false</span>, <span class="var">limit</span>);
    }
  };
}

<span class="cmt">// Fire at most once per 100ms during scroll</span>
<span class="var">window</span>.<span class="fn">addEventListener</span>(<span class="str">'scroll'</span>, <span class="fn">throttle</span>(<span class="fn">updateScrollProgress</span>, <span class="num">100</span>));</pre>
      </div>

      <table class="compare-table">
        <tr><th>Technique</th><th>Behavior</th><th>Best for</th></tr>
        <tr><td>Debounce</td><td>Wait until events stop</td><td>Search input, resize end</td></tr>
        <tr><td>Throttle</td><td>Fire once per interval</td><td>Scroll, mouse move</td></tr>
      </table>

      <div class="callout tip">
        <div class="callout-icon">✅</div>
        <div class="callout-body"><strong>In production</strong> Use lodash's <code>_.debounce</code> and <code>_.throttle</code> — they handle edge cases your hand-rolled version misses. But knowing how to build them yourself is what makes you understand WHEN and WHY to use them.</div>
      </div>
    `
  }
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const state = {
  completed: JSON.parse(localStorage.getItem('js_completed') || '[]'),
  currentLesson: null
};

function saveCompleted() {
  localStorage.setItem('js_completed', JSON.stringify(state.completed));
}

function getTotalTopics() {
  return CURRICULUM.reduce((sum, m) => sum + m.topics.length, 0);
}

function getProgress() {
  return state.completed.length / getTotalTopics();
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
const COLORS = {
  yellow: { bg: '#ffd60a', soft: '#fff9e6', border: '#ffe066', text: '#7a5800' },
  blue:   { bg: '#0071e3', soft: '#e8f1fc', border: '#aecbf5', text: '#003b82' },
  green:  { bg: '#30d158', soft: '#eafaf0', border: '#a8edbe', text: '#1a5c34' },
  orange: { bg: '#ff9f0a', soft: '#fff3e0', border: '#ffd080', text: '#7a4600' },
  teal:   { bg: '#32ade6', soft: '#e5f5fd', border: '#a3d9f7', text: '#00507a' },
  purple: { bg: '#bf5af2', soft: '#f5eafd', border: '#dbb4f7', text: '#5e1a8c' },
  pink:   { bg: '#ff375f', soft: '#ffeaee', border: '#ffafc0', text: '#8c0024' },
};

function renderSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = `<div style="padding:16px 20px 4px"><span style="font-size:13px;color:var(--text-3)">Your Progress</span><div style="margin-top:6px;background:var(--surface2);border-radius:8px;height:6px;overflow:hidden"><div id="sb-progress" style="height:100%;background:var(--blue);border-radius:8px;transition:width 0.4s ease;width:${Math.round(getProgress()*100)}%"></div></div></div>`;
  CURRICULUM.forEach(module => {
    const col = COLORS[module.color];
    const el = document.createElement('div');
    el.className = 'sidebar-section';
    el.innerHTML = `<div class="sidebar-label">${module.icon} ${module.title}</div>` +
      module.topics.map(t => {
        const done = state.completed.includes(t.id);
        return `<button class="sidebar-item${done ? ' done' : ''}" data-id="${t.id}">
          <span class="si-icon">${done ? '✓' : module.icon}</span>${t.title}
        </button>`;
      }).join('');
    nav.appendChild(el);
  });
  nav.querySelectorAll('.sidebar-item').forEach(btn => {
    btn.addEventListener('click', () => {
      openLesson(btn.dataset.id);
      closeSidebar();
    });
  });
}

function renderCurriculum() {
  const cur = document.getElementById('curriculum');
  cur.innerHTML = `<div class="section-header"><div class="section-label">Full Curriculum</div><div class="section-title">Choose Your Topic</div></div>`;

  CURRICULUM.forEach(module => {
    const col = COLORS[module.color];
    const completedCount = module.topics.filter(t => state.completed.includes(t.id)).length;
    const card = document.createElement('div');
    card.className = 'track-card';
    card.dataset.id = module.id;

    card.innerHTML = `
      <button class="track-header">
        <div class="track-icon" style="background:${col.soft};border:1px solid ${col.border};font-size:22px">${module.icon}</div>
        <div class="track-meta">
          <strong>${module.title}</strong>
          <span>${module.topics.length} topics · ${completedCount}/${module.topics.length} done</span>
        </div>
        <span class="track-chevron">›</span>
      </button>
      <div class="track-topics">${module.topics.map(t => {
        const done = state.completed.includes(t.id);
        const tagColors = { Intro:'var(--blue-soft),var(--blue)', Core:'var(--surface2),var(--text-3)', ES6:'var(--green-soft),var(--green)', Deep:'var(--purple-soft),var(--purple)', Browser:'var(--teal-soft),var(--teal)', Async:'var(--orange-soft),var(--orange)', ES2017:'var(--orange-soft),var(--orange)', Pattern:'var(--pink-soft),var(--pink)', Perf:'var(--yellow-soft),#8a6700', Testing:'var(--teal-soft),var(--teal)', Craft:'var(--green-soft),var(--green)', Security:'var(--pink-soft),var(--pink)', Modern:'var(--purple-soft),var(--purple)', Advanced:'var(--pink-soft),var(--pink)' };
        const [tbg, tc] = (tagColors[t.tag] || 'var(--surface2),var(--text-3)').split(',');
        return `<button class="topic-btn${done?' done':''}" data-id="${t.id}">
          <span class="topic-check">${done?'✓':''}</span>
          ${t.title}
          <span class="topic-tag" style="background:${tbg};color:${tc}">${t.tag}</span>
        </button>`;
      }).join('')}</div>`;

    card.querySelector('.track-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    card.querySelectorAll('.topic-btn').forEach(btn => {
      btn.addEventListener('click', () => openLesson(btn.dataset.id));
    });
    cur.appendChild(card);
  });
}

function updateProgress() {
  const pct = Math.round(getProgress() * 100);
  const circumference = 87.96;
  const offset = circumference * (1 - getProgress());
  document.getElementById('progress-circle').style.strokeDashoffset = offset;
  document.getElementById('progress-pct').textContent = pct + '%';
  const sb = document.getElementById('sb-progress');
  if (sb) sb.style.width = pct + '%';
}

// ═══════════════════════════════════════════
//  LESSON
// ═══════════════════════════════════════════
let allTopics = [];
CURRICULUM.forEach(m => m.topics.forEach(t => allTopics.push({...t, module: m})));

function openLesson(id) {
  const lesson = LESSONS[id];
  const topicInfo = allTopics.find(t => t.id === id);
  if (!lesson) {
    document.getElementById('curriculum').classList.remove('hidden');
    document.getElementById('lesson-view').classList.remove('show');
    return;
  }

  state.currentLesson = id;
  const topicIdx = allTopics.findIndex(t => t.id === id);
  const prev = allTopics[topicIdx - 1];
  const next = allTopics[topicIdx + 1];
  const isDone = state.completed.includes(id);
  const module = topicInfo?.module;
  const col = module ? COLORS[module.color] : COLORS.blue;

  const lv = document.getElementById('lesson-view');
  lv.innerHTML = `
    <div class="lesson-breadcrumb">
      <button onclick="showCurriculum()">← Curriculum</button>
      <span>›</span>
      <span>${module?.title || ''}</span>
    </div>
    <div class="lesson-hero">
      <div class="lesson-track-badge" style="background:${col.soft};border:1px solid ${col.border};color:${col.text}">${module?.icon || ''} ${module?.title || ''}</div>
      <h2>${lesson.title}</h2>
      <p>${lesson.subtitle}</p>
      <div class="lesson-meta-row">
        <span class="lesson-meta-pill">⏱ ${lesson.duration}</span>
        <span class="lesson-meta-pill">📊 ${lesson.level}</span>
      </div>
    </div>
    <div class="lesson-body">${lesson.content}</div>
    <button class="btn-done${isDone?' done':''}" id="mark-done-btn" onclick="toggleDone('${id}')">
      ${isDone ? '✓ Completed' : 'Mark as Complete'}
    </button>
    <div class="lesson-nav">
      ${prev ? `<button class="btn-nav" onclick="openLesson('${prev.id}')">← Previous</button>` : '<div></div>'}
      ${next ? `<button class="btn-nav primary" onclick="openLesson('${next.id}')">Next →</button>` : '<button class="btn-nav primary" onclick="showCurriculum()">All Topics</button>'}
    </div>
  `;

  document.getElementById('curriculum').classList.add('hidden');
  lv.classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateSidebarActive(id);
}

function showCurriculum() {
  document.getElementById('curriculum').classList.remove('hidden');
  document.getElementById('lesson-view').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateSidebarActive(null);
}

function toggleDone(id) {
  const idx = state.completed.indexOf(id);
  if (idx > -1) {
    state.completed.splice(idx, 1);
  } else {
    state.completed.push(id);
  }
  saveCompleted();
  updateProgress();
  const btn = document.getElementById('mark-done-btn');
  if (btn) {
    const done = state.completed.includes(id);
    btn.textContent = done ? '✓ Completed' : 'Mark as Complete';
    btn.className = 'btn-done' + (done ? ' done' : '');
  }
  renderSidebar();
  // Re-render curriculum topic buttons
  document.querySelectorAll(`.topic-btn[data-id="${id}"]`).forEach(b => {
    const done = state.completed.includes(id);
    b.className = 'topic-btn' + (done ? ' done' : '');
    b.querySelector('.topic-check').textContent = done ? '✓' : '';
  });
}

function updateSidebarActive(id) {
  document.querySelectorAll('.sidebar-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

// ═══════════════════════════════════════════
//  SIDEBAR TOGGLE
// ═══════════════════════════════════════════
const menuBtn = document.getElementById('menu-btn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  menuBtn.classList.remove('open');
}

menuBtn.addEventListener('click', () => {
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('show', isOpen);
  menuBtn.classList.toggle('open', isOpen);
});
overlay.addEventListener('click', closeSidebar);

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderSidebar();
renderCurriculum();
updateProgress();
</script>
</body>
</html>
