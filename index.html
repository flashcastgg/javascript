      <h3>Assignment Operators</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">let</span> <span class="var">x</span> <span class="op">=</span> <span class="num">10</span>;
<span class="var">x</span> <span class="op">+=</span> <span class="num">5</span>;  <span class="cmt">// x = x + 5 → 15</span>
<span class="var">x</span> <span class="op">-=</span> <span class="num">3</span>;  <span class="cmt">// x = x - 3 → 12</span>
<span class="var">x</span> <span class="op">*=</span> <span class="num">2</span>;  <span class="cmt">// x = x * 2 → 24</span>
<span class="var">x</span> <span class="op">/=</span> <span class="num">4</span>;  <span class="cmt">// x = x / 4 → 6</span>
<span class="var">x</span> <span class="op">%=</span> <span class="num">4</span>;  <span class="cmt">// x = x % 4 → 2</span></pre>
      </div>

      <h3>Comparison Operators</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre"><span class="num">5</span> <span class="op">==</span> <span class="str">"5"</span>    <span class="cmt">// true  — loose equality (converts types)</span>
<span class="num">5</span> <span class="op">===</span> <span class="str">"5"</span>   <span class="cmt">// false — strict equality (no conversion)</span>
<span class="num">5</span> <span class="op">!=</span> <span class="str">"5"</span>    <span class="cmt">// false — loose inequality</span>
<span class="num">5</span> <span class="op">!==</span> <span class="str">"5"</span>   <span class="cmt">// true  — strict inequality ✅ use this</span>
<span class="num">5</span> <span class="op">&gt;</span> <span class="num">3</span>       <span class="cmt">// true</span>
<span class="num">5</span> <span class="op">&gt;=</span> <span class="num">5</span>      <span class="cmt">// true</span>
<span class="num">5</span> <span class="op">&lt;</span> <span class="num">10</span>      <span class="cmt">// true</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>ALWAYS use === and !==</strong> The loose equality operator <code>==</code> does type coercion, leading to bizarre results like <code>0 == false</code> being true. Use strict equality <code>===</code> always. The only exception: checking for both null and undefined at once with <code>value == null</code>.</div>
      </div>

      <h3>Logical Operators</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">isAdult</span> <span class="op">=</span> <span class="kw">true</span>;
<span class="kw">const</span> <span class="var">hasAccount</span> <span class="op">=</span> <span class="kw">true</span>;
<span class="kw">const</span> <span class="var">isBanned</span> <span class="op">=</span> <span class="kw">false</span>;

<span class="cmt">// && (AND) — both must be true</span>
<span class="var">isAdult</span> <span class="op">&&</span> <span class="var">hasAccount</span>   <span class="cmt">// true</span>

<span class="cmt">// || (OR) — at least one must be true</span>
<span class="var">isAdult</span> <span class="op">||</span> <span class="var">isBanned</span>     <span class="cmt">// true</span>

<span class="cmt">// ! (NOT) — flips the boolean</span>
<span class="op">!</span><span class="var">isBanned</span>               <span class="cmt">// true</span>

<span class="cmt">// Short-circuit evaluation</span>
<span class="kw">const</span> <span class="var">name</span> <span class="op">=</span> <span class="kw">null</span>;
<span class="kw">const</span> <span class="var">display</span> <span class="op">=</span> <span class="var">name</span> <span class="op">||</span> <span class="str">"Guest"</span>; <span class="cmt">// "Guest"</span>

<span class="cmt">// Nullish coalescing ?? — only falls back if null/undefined</span>
<span class="kw">const</span> <span class="var">score</span> <span class="op">=</span> <span class="num">0</span>;
<span class="kw">const</span> <span class="var">display2</span> <span class="op">=</span> <span class="var">score</span> <span class="op">||</span> <span class="str">"No score"</span>;  <span class="cmt">// "No score" ← WRONG</span>
<span class="kw">const</span> <span class="var">display3</span> <span class="op">=</span> <span class="var">score</span> <span class="op">??</span> <span class="str">"No score"</span>; <span class="cmt">// 0 ← CORRECT ✅</span></pre>
      </div>
    `
  },
  'type-coercion': {
    title: 'Type Coercion & Comparison',
    subtitle: 'JavaScript\'s most confusing feature explained — why "1" + 1 = "11" but "1" - 1 = 0.',
    duration: '25 min', level: 'Beginner',
    content: `
      <h3>What is Type Coercion?</h3>
      <p>Type coercion is JavaScript's automatic conversion of values from one type to another. It's one of JS's most debated features — it can be clever, or it can be the source of nasty bugs if you don't understand it.</p>

      <h3>The + Operator is Special</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// + with two numbers = addition</span>
<span class="num">1</span> <span class="op">+</span> <span class="num">2</span>        <span class="cmt">// 3</span>

<span class="cmt">// + with a string = string concatenation!</span>
<span class="str">"1"</span> <span class="op">+</span> <span class="num">2</span>      <span class="cmt">// "12" (number coerced to string)</span>
<span class="num">1</span> <span class="op">+</span> <span class="str">"2"</span>      <span class="cmt">// "12"</span>
<span class="str">"5"</span> <span class="op">+</span> <span class="num">3</span> <span class="op">+</span> <span class="num">2</span>  <span class="cmt">// "532" (left to right)</span>
<span class="num">5</span> <span class="op">+</span> <span class="num">3</span> <span class="op">+</span> <span class="str">"2"</span>  <span class="cmt">// "82"</span>

<span class="cmt">// Other math ops convert strings to numbers</span>
<span class="str">"5"</span> <span class="op">-</span> <span class="num">1</span>      <span class="cmt">// 4</span>
<span class="str">"5"</span> <span class="op">*</span> <span class="num">2</span>      <span class="cmt">// 10</span>
<span class="str">"5"</span> <span class="op">/</span> <span class="num">2</span>      <span class="cmt">// 2.5</span></pre>
      </div>

      <h3>Falsy & Truthy Values</h3>
      <p>In JS, every value is either "truthy" or "falsy". This matters in conditionals.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// The 6 FALSY values in JavaScript</span>
<span class="kw">false</span>, <span class="num">0</span>, <span class="str">""</span>, <span class="kw">null</span>, <span class="kw">undefined</span>, <span class="obj">NaN</span>

<span class="cmt">// Everything else is TRUTHY, including:</span>
<span class="str">"0"</span>      <span class="cmt">// truthy! (non-empty string)</span>
<span class="str">"false"</span>  <span class="cmt">// truthy! (non-empty string)</span>
[]       <span class="cmt">// truthy! (empty array)</span>
{}       <span class="cmt">// truthy! (empty object)</span>

<span class="kw">if</span> (<span class="str">""</span>) {  <span class="cmt">// doesn't run</span>
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"This won't print"</span>);
}

<span class="kw">if</span> (<span class="str">"hello"</span>) {  <span class="cmt">// runs!</span>
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"This prints"</span>);
}</pre>
      </div>

      <div class="callout warn">
        <div class="callout-icon">⚠️</div>
        <div class="callout-body"><strong>Common Gotcha</strong> <code>[]</code> and <code>{}</code> are truthy even though they're "empty". Only use <code>if (arr)</code> to check if an array exists (not null/undefined), not if it has items. Use <code>arr.length</code> for that.</div>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Don't rely on implicit coercion. Be explicit: use <code>Number("5")</code>, <code>String(42)</code>, <code>Boolean(value)</code> when you need conversions. It makes your intent clear and prevents bugs.</div>
      </div>
    `
  },
  'conditionals': {
    title: 'if / else / switch',
    subtitle: 'Making decisions in your code — the building blocks of program logic.',
    duration: '20 min', level: 'Beginner',
    content: `
      <h3>The if Statement</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">age</span> <span class="op">=</span> <span class="num">20</span>;

<span class="kw">if</span> (<span class="var">age</span> <span class="op">>=</span> <span class="num">18</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Adult"</span>);
} <span class="kw">else if</span> (<span class="var">age</span> <span class="op">>=</span> <span class="num">13</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Teenager"</span>);
} <span class="kw">else</span> {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Child"</span>);
}

<span class="cmt">// Ternary operator — one-liner for simple if/else</span>
<span class="kw">const</span> <span class="var">status</span> <span class="op">=</span> <span class="var">age</span> <span class="op">>=</span> <span class="num">18</span> <span class="op">?</span> <span class="str">"adult"</span> <span class="op">:</span> <span class="str">"minor"</span>;</pre>
      </div>

      <h3>switch Statement</h3>
      <p>Use <code>switch</code> when comparing one value against many possibilities.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">const</span> <span class="var">day</span> <span class="op">=</span> <span class="str">"Monday"</span>;

<span class="kw">switch</span> (<span class="var">day</span>) {
  <span class="kw">case</span> <span class="str">"Monday"</span>:
  <span class="kw">case</span> <span class="str">"Tuesday"</span>:
    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Start of week"</span>);
    <span class="kw">break</span>; <span class="cmt">// IMPORTANT: without break, falls through!</span>
  <span class="kw">case</span> <span class="str">"Friday"</span>:
    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Almost weekend!"</span>);
    <span class="kw">break</span>;
  <span class="kw">default</span>:
    <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Midweek"</span>);
}</pre>
      </div>

      <div class="callout warn">
        <div class="callout-icon">⚠️</div>
        <div class="callout-body"><strong>Don't forget break!</strong> Without <code>break</code>, execution "falls through" to the next case. This is usually a bug, but can be intentional (like grouping Monday and Tuesday together above).</div>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Prefer object lookups over long switch/if-else chains. Instead of 10 case statements, use an object: <code>const messages = &#123; Monday: "...", Tuesday: "..." &#125;; messages[day]</code>. It's cleaner and more maintainable.</div>
      </div>
    `
  },
  'loops': {
    title: 'Loops: for, while, do-while',
    subtitle: 'Repeating code efficiently — the backbone of all data processing.',
    duration: '25 min', level: 'Beginner',
    content: `
      <h3>The for Loop</h3>
      <p>The classic loop with an initializer, condition, and incrementer. Best when you know how many times to loop.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Basic for loop</span>
<span class="kw">for</span> (<span class="kw">let</span> <span class="var">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="var">i</span> <span class="op">&lt;</span> <span class="num">5</span>; <span class="var">i</span><span class="op">++</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">i</span>); <span class="cmt">// 0, 1, 2, 3, 4</span>
}

<span class="cmt">// Looping over an array</span>
<span class="kw">const</span> <span class="var">fruits</span> <span class="op">=</span> [<span class="str">"apple"</span>, <span class="str">"banana"</span>, <span class="str">"mango"</span>];
<span class="kw">for</span> (<span class="kw">let</span> <span class="var">i</span> <span class="op">=</span> <span class="num">0</span>; <span class="var">i</span> <span class="op">&lt;</span> <span class="var">fruits</span>.<span class="obj">length</span>; <span class="var">i</span><span class="op">++</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">fruits</span>[<span class="var">i</span>]);
}

<span class="cmt">// for...of — clean array iteration (ES6)</span>
<span class="kw">for</span> (<span class="kw">const</span> <span class="var">fruit</span> <span class="kw">of</span> <span class="var">fruits</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">fruit</span>); <span class="cmt">// apple, banana, mango</span>
}

<span class="cmt">// for...in — iterate object keys</span>
<span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> { <span class="obj">name</span>: <span class="str">"Dan"</span>, <span class="obj">age</span>: <span class="num">30</span> };
<span class="kw">for</span> (<span class="kw">const</span> <span class="var">key</span> <span class="kw">in</span> <span class="var">user</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">key</span>, <span class="var">user</span>[<span class="var">key</span>]); <span class="cmt">// name Dan, age 30</span>
}</pre>
      </div>

      <h3>while Loop</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">let</span> <span class="var">attempts</span> <span class="op">=</span> <span class="num">0</span>;

<span class="kw">while</span> (<span class="var">attempts</span> <span class="op">&lt;</span> <span class="num">3</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">&#96;Attempt <span class="op">&#36;{</span><span class="var">attempts</span> <span class="op">+</span> <span class="num">1</span><span class="op">}</span>&#96;</span>);
  <span class="var">attempts</span><span class="op">++</span>;
}

<span class="cmt">// do-while — always runs at least once</span>
<span class="kw">do</span> {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Runs at least once"</span>);
  <span class="var">attempts</span><span class="op">++</span>;
} <span class="kw">while</span> (<span class="var">attempts</span> <span class="op">&lt;</span> <span class="num">3</span>);</pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> For arrays, prefer <code>for...of</code> over classic <code>for</code> loops — it's cleaner. For objects, use <code>Object.keys()</code>, <code>Object.values()</code>, or <code>Object.entries()</code> with <code>for...of</code> instead of <code>for...in</code>. For transforming data, use <code>map</code>, <code>filter</code>, <code>reduce</code> (covered later).</div>
      </div>
    `
  },
  'fn-basics': {
    title: 'Function Declarations & Expressions',
    subtitle: 'Functions are the fundamental unit of code reuse in JavaScript.',
    duration: '25 min', level: 'Beginner',
    content: `
      <h3>Why Functions?</h3>
      <p>Functions allow you to <strong>group code</strong> into reusable units, <strong>name a concept</strong>, and <strong>avoid repetition</strong>. If you find yourself copy-pasting code more than once, it belongs in a function.</p>

      <h3>Function Declaration</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Function Declaration — hoisted (can call before defined)</span>
<span class="kw">function</span> <span class="fn">greet</span>(<span class="var">name</span>) {
  <span class="kw">return</span> <span class="str">&#96;Hello, <span class="op">&#36;{</span><span class="var">name</span><span class="op">}</span>!&#96;</span>;
}

<span class="fn">console</span>.<span class="fn">log</span>(<span class="fn">greet</span>(<span class="str">"Flashcast"</span>)); <span class="cmt">// "Hello, Flashcast!"</span>

<span class="cmt">// Parameters with defaults</span>
<span class="kw">function</span> <span class="fn">greet</span>(<span class="var">name</span> <span class="op">=</span> <span class="str">"World"</span>) {
  <span class="kw">return</span> <span class="str">&#96;Hello, <span class="op">&#36;{</span><span class="var">name</span><span class="op">}</span>!&#96;</span>;
}
<span class="fn">greet</span>();            <span class="cmt">// "Hello, World!"</span>
<span class="fn">greet</span>(<span class="str">"Dan"</span>);       <span class="cmt">// "Hello, Dan!"</span></pre>
      </div>

      <h3>Function Expression</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre"><span class="cmt">// Function Expression — NOT hoisted</span>
<span class="kw">const</span> <span class="var">greet</span> <span class="op">=</span> <span class="kw">function</span>(<span class="var">name</span>) {
  <span class="kw">return</span> <span class="str">&#96;Hello, <span class="op">&#36;{</span><span class="var">name</span><span class="op">}</span>!&#96;</span>;
};

<span class="cmt">// Functions are values — can be passed around!</span>
<span class="kw">const</span> <span class="var">ops</span> <span class="op">=</span> {
  <span class="obj">add</span>: <span class="kw">function</span>(<span class="var">a</span>, <span class="var">b</span>) { <span class="kw">return</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>; },
  <span class="obj">sub</span>: <span class="kw">function</span>(<span class="var">a</span>, <span class="var">b</span>) { <span class="kw">return</span> <span class="var">a</span> <span class="op">-</span> <span class="var">b</span>; },
};
<span class="var">ops</span>.<span class="fn">add</span>(<span class="num">5</span>, <span class="num">3</span>); <span class="cmt">// 8</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE: Single Responsibility</strong> A function should do ONE thing and do it well. If your function has "and" in its name (e.g., <code>fetchAndDisplayUser</code>), consider splitting it into two. Smaller functions are easier to test, debug, and reuse.</div>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE: Return Early</strong> Use early returns to handle edge cases at the top. Avoid deep nesting. "Happy path" logic flows naturally at the bottom, making the code easier to read.</div>
      </div>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// ❌ Deeply nested (hard to read)</span>
<span class="kw">function</span> <span class="fn">processOrder</span>(<span class="var">order</span>) {
  <span class="kw">if</span> (<span class="var">order</span>) {
    <span class="kw">if</span> (<span class="var">order</span>.<span class="obj">items</span>.<span class="obj">length</span> <span class="op">&gt;</span> <span class="num">0</span>) {
      <span class="kw">if</span> (<span class="var">order</span>.<span class="obj">paid</span>) {
        <span class="cmt">// actual logic buried here</span>
      }
    }
  }
}

<span class="cmt">// ✅ Early returns (clean)</span>
<span class="kw">function</span> <span class="fn">processOrder</span>(<span class="var">order</span>) {
  <span class="kw">if</span> (<span class="op">!</span><span class="var">order</span>) <span class="kw">return</span>;
  <span class="kw">if</span> (<span class="var">order</span>.<span class="obj">items</span>.<span class="obj">length</span> <span class="op">===</span> <span class="num">0</span>) <span class="kw">return</span>;
  <span class="kw">if</span> (<span class="op">!</span><span class="var">order</span>.<span class="obj">paid</span>) <span class="kw">return</span>;
  <span class="cmt">// happy path — clean and readable</span>
}</pre>
      </div>
    `
  },
  'arrow-fns': {
    title: 'Arrow Functions',
    subtitle: 'A concise function syntax with lexical this binding — one of ES6\'s biggest wins.',
    duration: '20 min', level: 'Intermediate',
    content: `
      <h3>Arrow Function Syntax</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Traditional function</span>
<span class="kw">const</span> <span class="var">add</span> <span class="op">=</span> <span class="kw">function</span>(<span class="var">a</span>, <span class="var">b</span>) {
  <span class="kw">return</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>;
};

<span class="cmt">// Arrow function — equivalent</span>
<span class="kw">const</span> <span class="var">add</span> <span class="op">=</span> (<span class="var">a</span>, <span class="var">b</span>) <span class="op">=&gt;</span> {
  <span class="kw">return</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>;
};

<span class="cmt">// Implicit return — no braces needed for single expression</span>
<span class="kw">const</span> <span class="var">add</span> <span class="op">=</span> (<span class="var">a</span>, <span class="var">b</span>) <span class="op">=&gt;</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>;

<span class="cmt">// Single parameter — no parens needed</span>
<span class="kw">const</span> <span class="var">double</span> <span class="op">=</span> <span class="var">x</span> <span class="op">=&gt;</span> <span class="var">x</span> <span class="op">*</span> <span class="num">2</span>;

<span class="cmt">// No parameters — empty parens required</span>
<span class="kw">const</span> <span class="var">greet</span> <span class="op">=</span> () <span class="op">=&gt;</span> <span class="str">"Hello!"</span>;

<span class="cmt">// Returning an object — wrap in parens!</span>
<span class="kw">const</span> <span class="var">makeUser</span> <span class="op">=</span> <span class="var">name</span> <span class="op">=&gt;</span> ({ <span class="obj">name</span>, <span class="obj">id</span>: <span class="fn">Date</span>.<span class="fn">now</span>() });</pre>
      </div>

      <h3>Arrow Functions & this</h3>
      <p>The biggest difference between arrow functions and regular functions is how they handle <code>this</code>.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre"><span class="kw">const</span> <span class="var">timer</span> <span class="op">=</span> {
  <span class="obj">count</span>: <span class="num">0</span>,
  
  <span class="cmt">// ❌ Regular function loses 'this'</span>
  <span class="fn">startBad</span>() {
    <span class="fn">setInterval</span>(<span class="kw">function</span>() {
      <span class="kw">this</span>.<span class="obj">count</span><span class="op">++</span>; <span class="cmt">// 'this' is undefined or window!</span>
    }, <span class="num">1000</span>);
  },

  <span class="cmt">// ✅ Arrow function inherits 'this' from parent scope</span>
  <span class="fn">startGood</span>() {
    <span class="fn">setInterval</span>(() <span class="op">=&gt;</span> {
      <span class="kw">this</span>.<span class="obj">count</span><span class="op">++</span>; <span class="cmt">// 'this' correctly refers to timer object</span>
    }, <span class="num">1000</span>);
  }
};</pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>WHEN TO USE ARROW vs REGULAR</strong> Use arrow functions for: callbacks, array methods, short utility functions. Use regular functions for: object methods (when you need <code>this</code>), constructors, and when you need <code>arguments</code> object.</div>
      </div>
    `
  },
  'scope': {
    title: 'Scope, Hoisting & Closures',
    subtitle: 'Three of the most important and most misunderstood concepts in JavaScript.',
    duration: '35 min', level: 'Intermediate',
    content: `
      <h3>Scope</h3>
      <p>Scope defines where a variable is accessible. JavaScript has three types of scope:</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// 1. Global Scope — accessible everywhere</span>
<span class="kw">const</span> <span class="var">APP_NAME</span> <span class="op">=</span> <span class="str">"MyApp"</span>;

<span class="kw">function</span> <span class="fn">outer</span>() {
  <span class="cmt">// 2. Function Scope — local to this function</span>
  <span class="kw">const</span> <span class="var">outerVar</span> <span class="op">=</span> <span class="str">"I'm outer"</span>;

  <span class="kw">function</span> <span class="fn">inner</span>() {
    <span class="cmt">// 3. Block Scope — also affected by let/const</span>
    <span class="kw">const</span> <span class="var">innerVar</span> <span class="op">=</span> <span class="str">"I'm inner"</span>;
    <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">outerVar</span>); <span class="cmt">// ✅ can access outer scope</span>
    <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">APP_NAME</span>); <span class="cmt">// ✅ can access global</span>
  }
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">innerVar</span>); <span class="cmt">// ❌ ReferenceError</span>
}</pre>
      </div>

      <h3>Hoisting</h3>
      <p>JavaScript moves declarations to the top of their scope during compilation. This is called hoisting.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Function declarations are fully hoisted</span>
<span class="fn">greet</span>(); <span class="cmt">// ✅ Works! "Hello"</span>
<span class="kw">function</span> <span class="fn">greet</span>() { <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Hello"</span>); }

<span class="cmt">// var is hoisted but initialized as undefined</span>
<span class="fn">console</span>.<span class="fn">log</span>(<span class="var">x</span>); <span class="cmt">// undefined (not ReferenceError)</span>
<span class="kw">var</span> <span class="var">x</span> <span class="op">=</span> <span class="num">5</span>;

<span class="cmt">// let/const are hoisted but in Temporal Dead Zone (TDZ)</span>
<span class="fn">console</span>.<span class="fn">log</span>(<span class="var">y</span>); <span class="cmt">// ReferenceError: Cannot access before init</span>
<span class="kw">let</span> <span class="var">y</span> <span class="op">=</span> <span class="num">5</span>;</pre>
      </div>

      <h3>Closures — The Power Move</h3>
      <p>A closure is when a function "remembers" variables from its outer scope even after that outer function has finished. This is one of JS's most powerful features.</p>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">function</span> <span class="fn">makeCounter</span>() {
  <span class="kw">let</span> <span class="var">count</span> <span class="op">=</span> <span class="num">0</span>; <span class="cmt">// This is "closed over"</span>

  <span class="kw">return</span> {
    <span class="fn">increment</span>: () <span class="op">=&gt;</span> <span class="op">++</span><span class="var">count</span>,
    <span class="fn">decrement</span>: () <span class="op">=&gt;</span> <span class="op">--</span><span class="var">count</span>,
    <span class="fn">getCount</span>: () <span class="op">=&gt;</span> <span class="var">count</span>
  };
}

<span class="kw">const</span> <span class="var">counter</span> <span class="op">=</span> <span class="fn">makeCounter</span>();
<span class="var">counter</span>.<span class="fn">increment</span>(); <span class="cmt">// 1</span>
<span class="var">counter</span>.<span class="fn">increment</span>(); <span class="cmt">// 2</span>
<span class="var">counter</span>.<span class="fn">decrement</span>(); <span class="cmt">// 1</span>
<span class="var">counter</span>.<span class="fn">getCount</span>(); <span class="cmt">// 1</span>
<span class="cmt">// count is private — only accessible through the returned methods</span></pre>
      </div>

      <div class="callout info">
        <div class="callout-icon">💡</div>
        <div class="callout-body"><strong>Real-world use of closures</strong> Closures are everywhere: React's hooks use them (useState remembers state between renders), event handlers, partial application, memoization, module patterns. Understanding closures unlocks understanding of how all these work.</div>
      </div>
    `
  },
  'promises': {
    title: 'Promises',
    subtitle: 'A clean way to handle asynchronous operations — the foundation of modern async JS.',
    duration: '30 min', level: 'Intermediate',
    content: `
      <h3>What is a Promise?</h3>
      <p>A Promise is an object representing the eventual completion or failure of an async operation. It's a "promise" that you'll get a value... eventually.</p>
      <p>A Promise has 3 states: <strong>Pending</strong> (waiting), <strong>Fulfilled</strong> (success), or <strong>Rejected</strong> (failure).</p>

      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Creating a Promise</span>
<span class="kw">const</span> <span class="var">myPromise</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">Promise</span>((<span class="var">resolve</span>, <span class="var">reject</span>) <span class="op">=&gt;</span> {
  <span class="kw">const</span> <span class="var">success</span> <span class="op">=</span> <span class="kw">true</span>;
  
  <span class="kw">if</span> (<span class="var">success</span>) {
    <span class="fn">resolve</span>(<span class="str">"Done! Here's your data."</span>);
  } <span class="kw">else</span> {
    <span class="fn">reject</span>(<span class="kw">new</span> <span class="obj">Error</span>(<span class="str">"Something went wrong"</span>));
  }
});

<span class="cmt">// Consuming a Promise</span>
<span class="var">myPromise</span>
  .<span class="fn">then</span>(<span class="var">data</span> <span class="op">=&gt;</span> <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">data</span>))      <span class="cmt">// success</span>
  .<span class="fn">catch</span>(<span class="var">err</span> <span class="op">=&gt;</span> <span class="fn">console</span>.<span class="fn">error</span>(<span class="var">err</span>))    <span class="cmt">// failure</span>
  .<span class="fn">finally</span>(() <span class="op">=&gt;</span> <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Done"</span>)); <span class="cmt">// always runs</span></pre>
      </div>

      <h3>Promise Chaining</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre"><span class="fn">fetchUser</span>(<span class="num">1</span>)
  .<span class="fn">then</span>(<span class="var">user</span> <span class="op">=&gt;</span> <span class="fn">fetchOrders</span>(<span class="var">user</span>.<span class="obj">id</span>))
  .<span class="fn">then</span>(<span class="var">orders</span> <span class="op">=&gt;</span> <span class="fn">filterPaid</span>(<span class="var">orders</span>))
  .<span class="fn">then</span>(<span class="var">paid</span> <span class="op">=&gt;</span> <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">paid</span>))
  .<span class="fn">catch</span>(<span class="var">err</span> <span class="op">=&gt;</span> <span class="fn">console</span>.<span class="fn">error</span>(<span class="var">err</span>));</pre>
      </div>

      <h3>Promise.all — Run in Parallel</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// All must succeed — fails if ANY fails</span>
<span class="kw">const</span> [<span class="var">users</span>, <span class="var">posts</span>, <span class="var">comments</span>] <span class="op">=</span> <span class="kw">await</span> <span class="obj">Promise</span>.<span class="fn">all</span>([
  <span class="fn">fetchUsers</span>(),
  <span class="fn">fetchPosts</span>(),
  <span class="fn">fetchComments</span>()
]);

<span class="cmt">// allSettled — get all results even if some fail</span>
<span class="kw">const</span> <span class="var">results</span> <span class="op">=</span> <span class="kw">await</span> <span class="obj">Promise</span>.<span class="fn">allSettled</span>([...]);

<span class="cmt">// race — resolves/rejects with whichever finishes first</span>
<span class="kw">const</span> <span class="var">fastest</span> <span class="op">=</span> <span class="kw">await</span> <span class="obj">Promise</span>.<span class="fn">race</span>([<span class="fn">fast</span>(), <span class="fn">slow</span>()]);</pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Use <code>Promise.all()</code> when you need multiple async operations to run simultaneously (not one after another). Running them sequentially with multiple awaits can be 3x slower than running them in parallel.</div>
      </div>
    `
  },
  'async-await': {
    title: 'async / await',
    subtitle: 'Write async code that reads like synchronous code — the modern way to handle Promises.',
    duration: '30 min', level: 'Intermediate',
    content: `
      <h3>What is async/await?</h3>
      <p>async/await is syntactic sugar over Promises. It makes async code look and feel like regular synchronous code — far easier to read and write than Promise chains.</p>

      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// Promise chain version</span>
<span class="kw">function</span> <span class="fn">loadUserData</span>() {
  <span class="kw">return</span> <span class="fn">fetchUser</span>()
    .<span class="fn">then</span>(<span class="var">user</span> <span class="op">=&gt;</span> <span class="fn">fetchPosts</span>(<span class="var">user</span>.<span class="obj">id</span>))
    .<span class="fn">then</span>(<span class="var">posts</span> <span class="op">=&gt;</span> { <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">posts</span>); });
}

<span class="cmt">// async/await version — much cleaner ✅</span>
<span class="kw">async function</span> <span class="fn">loadUserData</span>() {
  <span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetchUser</span>();
  <span class="kw">const</span> <span class="var">posts</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetchPosts</span>(<span class="var">user</span>.<span class="obj">id</span>);
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="var">posts</span>);
}</pre>
      </div>

      <h3>Error Handling with try/catch</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">async function</span> <span class="fn">getUser</span>(<span class="var">id</span>) {
  <span class="kw">try</span> {
    <span class="kw">const</span> <span class="var">response</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">&#96;/api/users/<span class="op">&#36;{</span><span class="var">id</span><span class="op">}</span>&#96;</span>);
    
    <span class="kw">if</span> (<span class="op">!</span><span class="var">response</span>.<span class="obj">ok</span>) {
      <span class="kw">throw new</span> <span class="obj">Error</span>(<span class="str">&#96;HTTP error: <span class="op">&#36;{</span><span class="var">response</span>.<span class="obj">status</span><span class="op">}</span>&#96;</span>);
    }
    
    <span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="kw">await</span> <span class="var">response</span>.<span class="fn">json</span>();
    <span class="kw">return</span> <span class="var">user</span>;
  } <span class="kw">catch</span> (<span class="var">error</span>) {
    <span class="fn">console</span>.<span class="fn">error</span>(<span class="str">"Failed to fetch user:"</span>, <span class="var">error</span>);
    <span class="kw">throw</span> <span class="var">error</span>; <span class="cmt">// re-throw so caller knows</span>
  }
}</pre>
      </div>

      <h3>Running Async in Parallel</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre"><span class="cmt">// ❌ Sequential — slow! (waits for each)</span>
<span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetchUser</span>();    <span class="cmt">// 300ms</span>
<span class="kw">const</span> <span class="var">posts</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetchPosts</span>(); <span class="cmt">// 300ms — total: 600ms</span>

<span class="cmt">// ✅ Parallel — fast! (run at the same time)</span>
<span class="kw">const</span> [<span class="var">user</span>, <span class="var">posts</span>] <span class="op">=</span> <span class="kw">await</span> <span class="obj">Promise</span>.<span class="fn">all</span>([
  <span class="fn">fetchUser</span>(),
  <span class="fn">fetchPosts</span>()
]); <span class="cmt">// total: ~300ms</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Every <code>async</code> function returns a Promise. If a caller doesn't <code>await</code> it, errors will be silently swallowed. Always handle your promises — either await them or attach a <code>.catch()</code>.</div>
      </div>
    `
  },
  'fetch': {
    title: 'Fetch API & HTTP Requests',
    subtitle: 'Communicating with servers — getting and sending data from your JavaScript code.',
    duration: '30 min', level: 'Intermediate',
    content: `
      <h3>The Fetch API</h3>
      <p>The Fetch API is the modern, browser-built way to make HTTP requests. It replaced the older XMLHttpRequest (XHR) and is Promise-based.</p>

      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// GET request</span>
<span class="kw">async function</span> <span class="fn">getUsers</span>() {
  <span class="kw">const</span> <span class="var">response</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">'https://api.example.com/users'</span>);
  
  <span class="kw">if</span> (<span class="op">!</span><span class="var">response</span>.<span class="obj">ok</span>) {
    <span class="kw">throw new</span> <span class="obj">Error</span>(<span class="str">&#96;HTTP error! Status: <span class="op">&#36;{</span><span class="var">response</span>.<span class="obj">status</span><span class="op">}</span>&#96;</span>);
  }
  
  <span class="kw">const</span> <span class="var">data</span> <span class="op">=</span> <span class="kw">await</span> <span class="var">response</span>.<span class="fn">json</span>();
  <span class="kw">return</span> <span class="var">data</span>;
}

<span class="cmt">// POST request — sending data</span>
<span class="kw">async function</span> <span class="fn">createUser</span>(<span class="var">userData</span>) {
  <span class="kw">const</span> <span class="var">response</span> <span class="op">=</span> <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">'/api/users'</span>, {
    <span class="obj">method</span>: <span class="str">'POST'</span>,
    <span class="obj">headers</span>: {
      <span class="str">'Content-Type'</span>: <span class="str">'application/json'</span>,
      <span class="str">'Authorization'</span>: <span class="str">&#96;Bearer <span class="op">&#36;{</span><span class="var">token</span><span class="op">}</span>&#96;</span>
    },
    <span class="obj">body</span>: <span class="obj">JSON</span>.<span class="fn">stringify</span>(<span class="var">userData</span>)
  });
  <span class="kw">return</span> <span class="var">response</span>.<span class="fn">json</span>();
}</pre>
      </div>

      <h3>HTTP Methods Cheat Sheet</h3>
      <table class="compare-table">
        <tr><th>Method</th><th>Use for</th><th>Has Body?</th></tr>
        <tr><td>GET</td><td>Reading data</td><td>No</td></tr>
        <tr><td>POST</td><td>Creating data</td><td>Yes</td></tr>
        <tr><td>PUT</td><td>Replacing data</td><td>Yes</td></tr>
        <tr><td>PATCH</td><td>Updating partial data</td><td>Yes</td></tr>
        <tr><td>DELETE</td><td>Deleting data</td><td>Rarely</td></tr>
      </table>

      <div class="callout warn">
        <div class="callout-icon">⚠️</div>
        <div class="callout-body"><strong>Fetch doesn't throw on HTTP errors!</strong> A 404 or 500 response does NOT throw an error — <code>response.ok</code> will just be false. Always check <code>response.ok</code> manually and throw if needed.</div>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Create a wrapper function around fetch that handles common cases (error checking, JSON parsing, auth headers). Don't repeat the same fetch boilerplate everywhere. Libraries like <code>axios</code> do this for you and are worth using in production.</div>
      </div>
    `
  },
  'classes': {
    title: 'ES6 Classes',
    subtitle: 'A cleaner syntax for creating objects with shared methods and behavior.',
    duration: '30 min', level: 'Intermediate',
    content: `
      <h3>Defining a Class</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">class</span> <span class="obj">User</span> {
  <span class="cmt">// Constructor runs when you create a new instance</span>
  <span class="fn">constructor</span>(<span class="var">name</span>, <span class="var">email</span>) {
    <span class="kw">this</span>.<span class="obj">name</span> <span class="op">=</span> <span class="var">name</span>;
    <span class="kw">this</span>.<span class="obj">email</span> <span class="op">=</span> <span class="var">email</span>;
    <span class="kw">this</span>.<span class="obj">createdAt</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">Date</span>();
  }

  <span class="cmt">// Instance method — available on each user object</span>
  <span class="fn">greet</span>() {
    <span class="kw">return</span> <span class="str">&#96;Hi, I'm <span class="op">&#36;{</span><span class="kw">this</span>.<span class="obj">name</span><span class="op">}</span>!&#96;</span>;
  }

  <span class="cmt">// Static method — called on the class itself, not instances</span>
  <span class="kw">static</span> <span class="fn">create</span>(<span class="var">name</span>, <span class="var">email</span>) {
    <span class="kw">return new</span> <span class="obj">User</span>(<span class="var">name</span>, <span class="var">email</span>);
  }

  <span class="cmt">// Getter — access like a property</span>
  <span class="kw">get</span> <span class="fn">displayName</span>() {
    <span class="kw">return</span> <span class="kw">this</span>.<span class="obj">name</span>.<span class="fn">toUpperCase</span>();
  }
}

<span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">User</span>(<span class="str">"Flashcast"</span>, <span class="str">"dan@example.com"</span>);
<span class="var">user</span>.<span class="fn">greet</span>();       <span class="cmt">// "Hi, I'm Flashcast!"</span>
<span class="var">user</span>.<span class="obj">displayName</span>;  <span class="cmt">// "FLASHCAST"</span>
<span class="obj">User</span>.<span class="fn">create</span>(<span class="str">"Bob"</span>, <span class="str">"bob@example.com"</span>);</pre>
      </div>

      <h3>Inheritance</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">class</span> <span class="obj">AdminUser</span> <span class="kw">extends</span> <span class="obj">User</span> {
  <span class="fn">constructor</span>(<span class="var">name</span>, <span class="var">email</span>, <span class="var">role</span>) {
    <span class="kw">super</span>(<span class="var">name</span>, <span class="var">email</span>); <span class="cmt">// call parent constructor first!</span>
    <span class="kw">this</span>.<span class="obj">role</span> <span class="op">=</span> <span class="var">role</span>;
  }

  <span class="fn">greet</span>() {
    <span class="kw">return</span> <span class="str">&#96;<span class="op">&#36;{</span><span class="kw">super</span>.<span class="fn">greet</span>()<span class="op">}</span> I'm an admin.&#96;</span>;
  }
}

<span class="kw">const</span> <span class="var">admin</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">AdminUser</span>(<span class="str">"Dan"</span>, <span class="str">"d@x.com"</span>, <span class="str">"superadmin"</span>);
<span class="var">admin</span>.<span class="fn">greet</span>(); <span class="cmt">// "Hi, I'm Dan! I'm an admin."</span>
<span class="var">admin</span> <span class="kw">instanceof</span> <span class="obj">User</span>; <span class="cmt">// true</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE: Favor composition over inheritance</strong> Inheritance creates tight coupling. If you find yourself inheriting more than 2 levels deep, use object composition instead — mix in behaviors rather than creating deep class hierarchies.</div>
      </div>
    `
  },
  'modules': {
    title: 'ES Modules: import & export',
    subtitle: 'How to split your code into reusable files — the foundation of modern JS architecture.',
    duration: '25 min', level: 'Intermediate',
    content: `
      <h3>Why Modules?</h3>
      <p>Before modules, all JavaScript lived in one file or leaked into global scope. Modules let you split code into separate files, each with its own private scope, and explicitly share only what you want.</p>

      <h3>Named Exports & Imports</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// utils.js — exporting</span>
<span class="kw">export const</span> <span class="var">PI</span> <span class="op">=</span> <span class="num">3.14159</span>;
<span class="kw">export function</span> <span class="fn">add</span>(<span class="var">a</span>, <span class="var">b</span>) { <span class="kw">return</span> <span class="var">a</span> <span class="op">+</span> <span class="var">b</span>; }
<span class="kw">export const</span> <span class="fn">multiply</span> <span class="op">=</span> (<span class="var">a</span>, <span class="var">b</span>) <span class="op">=&gt;</span> <span class="var">a</span> <span class="op">*</span> <span class="var">b</span>;

<span class="cmt">// main.js — importing</span>
<span class="kw">import</span> { <span class="var">PI</span>, <span class="fn">add</span>, <span class="fn">multiply</span> } <span class="kw">from</span> <span class="str">'./utils.js'</span>;
<span class="kw">import</span> { <span class="fn">add</span> <span class="kw">as</span> <span class="fn">sum</span> } <span class="kw">from</span> <span class="str">'./utils.js'</span>; <span class="cmt">// rename</span>
<span class="kw">import</span> <span class="op">*</span> <span class="kw">as</span> <span class="obj">Utils</span> <span class="kw">from</span> <span class="str">'./utils.js'</span>; <span class="cmt">// import all</span></pre>
      </div>

      <h3>Default Export</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// userService.js</span>
<span class="kw">export default class</span> <span class="obj">UserService</span> {
  <span class="fn">getUser</span>(<span class="var">id</span>) { <span class="cmt">/* ... */</span> }
}

<span class="cmt">// main.js — no curly braces for default</span>
<span class="kw">import</span> <span class="obj">UserService</span> <span class="kw">from</span> <span class="str">'./userService.js'</span>;
<span class="kw">import</span> <span class="obj">AnyName</span> <span class="kw">from</span> <span class="str">'./userService.js'</span>; <span class="cmt">// can name it anything</span></pre>
      </div>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Prefer named exports over default exports. Named exports are explicit, work better with tree-shaking (unused code removal), and your IDE can auto-import them. Reserve <code>export default</code> for components in React/Vue.</div>
      </div>
    `
  },
  'clean-code': {
    title: 'Clean Code in JavaScript',
    subtitle: 'Writing code that humans can read, maintain, and extend — the mark of a pro.',
    duration: '40 min', level: 'All Levels',
    content: `
      <h3>Why Clean Code?</h3>
      <p>You write code once. But you (and your team) will read it dozens of times. Code is communication. Clean code is not about clever tricks — it's about clarity.</p>
      <p><strong>"Any fool can write code that a computer can understand. Good programmers write code that humans can understand."</strong> — Martin Fowler</p>

      <h3>1. Meaningful Names</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// ❌ Bad names</span>
<span class="kw">const</span> <span class="var">d</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">Date</span>();
<span class="kw">const</span> <span class="var">x</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">filter</span>(<span class="var">u</span> <span class="op">=&gt;</span> <span class="var">u</span>.<span class="obj">a</span>);
<span class="kw">function</span> <span class="fn">process</span>(<span class="var">data</span>) {}

<span class="cmt">// ✅ Good names</span>
<span class="kw">const</span> <span class="var">currentDate</span> <span class="op">=</span> <span class="kw">new</span> <span class="obj">Date</span>();
<span class="kw">const</span> <span class="var">activeUsers</span> <span class="op">=</span> <span class="var">users</span>.<span class="fn">filter</span>(<span class="var">user</span> <span class="op">=&gt;</span> <span class="var">user</span>.<span class="obj">isActive</span>);
<span class="kw">function</span> <span class="fn">sendWelcomeEmail</span>(<span class="var">user</span>) {}</pre>
      </div>

      <h3>2. Functions Should Do ONE Thing</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// ❌ Does too many things</span>
<span class="kw">function</span> <span class="fn">handleUser</span>(<span class="var">user</span>) {
  <span class="kw">const</span> <span class="var">validated</span> <span class="op">=</span> <span class="fn">validateEmail</span>(<span class="var">user</span>.<span class="obj">email</span>);
  <span class="var">db</span>.<span class="fn">save</span>(<span class="var">user</span>);
  <span class="fn">sendEmail</span>(<span class="var">user</span>.<span class="obj">email</span>);
  <span class="fn">logAnalytics</span>(<span class="str">'user_created'</span>);
}

<span class="cmt">// ✅ Each function has one job</span>
<span class="kw">async function</span> <span class="fn">createUser</span>(<span class="var">userData</span>) {
  <span class="fn">validateUser</span>(<span class="var">userData</span>);
  <span class="kw">const</span> <span class="var">user</span> <span class="op">=</span> <span class="kw">await</span> <span class="var">db</span>.<span class="fn">save</span>(<span class="var">userData</span>);
  <span class="kw">await</span> <span class="fn">notifyNewUser</span>(<span class="var">user</span>);
  <span class="kw">return</span> <span class="var">user</span>;
}</pre>
      </div>

      <h3>3. Avoid Magic Numbers</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="cmt">// ❌ What is 86400?</span>
<span class="kw">const</span> <span class="var">seconds</span> <span class="op">=</span> <span class="num">86400</span>;

<span class="cmt">// ✅ Obvious</span>
<span class="kw">const</span> <span class="var">SECONDS_IN_A_DAY</span> <span class="op">=</span> <span class="num">60</span> <span class="op">*</span> <span class="num">60</span> <span class="op">*</span> <span class="num">24</span>; <span class="cmt">// 86400</span></pre>
      </div>

      <h3>4. Consistent Code Style</h3>
      <ul>
        <li>Use a linter (ESLint) and formatter (Prettier) — non-negotiable on any real project</li>
        <li><code>camelCase</code> for variables and functions</li>
        <li><code>PascalCase</code> for classes and constructors</li>
        <li><code>SCREAMING_SNAKE_CASE</code> for true constants</li>
        <li>Meaningful boolean names: <code>isLoading</code>, <code>hasError</code>, <code>canSubmit</code></li>
      </ul>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>THE GOLDEN RULE</strong> Code is read far more often than it's written. Optimize for readability, not cleverness. If you have to leave a comment explaining WHAT code does, the code isn't clear enough. Comments should explain WHY.</div>
      </div>

      <div class="practice-box">
        <h4>🎯 Practice Exercise</h4>
        <p>Take any piece of code you wrote last week and refactor it: better names, smaller functions, no magic numbers. Notice how much easier it is to understand?</p>
      </div>
    `
  },
  'debugging': {
    title: 'Debugging Like a Pro',
    subtitle: 'Find and fix bugs systematically — the skill that separates amateurs from pros.',
    duration: '30 min', level: 'All Levels',
    content: `
      <h3>console Methods</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Basic log"</span>);
<span class="fn">console</span>.<span class="fn">warn</span>(<span class="str">"Yellow warning"</span>);
<span class="fn">console</span>.<span class="fn">error</span>(<span class="str">"Red error"</span>);
<span class="fn">console</span>.<span class="fn">table</span>([{ <span class="obj">name</span>: <span class="str">"Dan"</span>, <span class="obj">age</span>: <span class="num">30</span> }]); <span class="cmt">// visual table</span>
<span class="fn">console</span>.<span class="fn">group</span>(<span class="str">"User Data"</span>);
<span class="fn">console</span>.<span class="fn">log</span>(<span class="var">user</span>);
<span class="fn">console</span>.<span class="fn">groupEnd</span>();
<span class="fn">console</span>.<span class="fn">time</span>(<span class="str">"operation"</span>);
<span class="cmt">// ... code ...</span>
<span class="fn">console</span>.<span class="fn">timeEnd</span>(<span class="str">"operation"</span>); <span class="cmt">// "operation: 12.4ms"</span>
<span class="fn">console</span>.<span class="fn">assert</span>(<span class="num">1</span> <span class="op">===</span> <span class="num">2</span>, <span class="str">"1 should equal 2"</span>); <span class="cmt">// only logs if false</span></pre>
      </div>

      <h3>The debugger Statement</h3>
      <div class="code-block">
        <div class="code-block-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
        <pre><span class="kw">function</span> <span class="fn">calculateTotal</span>(<span class="var">cart</span>) {
  <span class="kw">debugger</span>; <span class="cmt">// Browser will pause here if DevTools is open</span>
  <span class="kw">return</span> <span class="var">cart</span>.<span class="fn">reduce</span>((<span class="var">sum</span>, <span class="var">item</span>) <span class="op">=&gt;</span> <span class="var">sum</span> <span class="op">+</span> <span class="var">item</span>.<span class="obj">price</span>, <span class="num">0</span>);
}</pre>
      </div>

      <h3>Debugging Process</h3>
      <ol>
        <li><strong>Reproduce the bug reliably</strong> — if you can't reproduce it, you can't fix it</li>
        <li><strong>Isolate the problem</strong> — binary search your code, comment things out</li>
        <li><strong>Form a hypothesis</strong> — what do you THINK is happening?</li>
        <li><strong>Test your hypothesis</strong> — log values, use debugger</li>
        <li><strong>Fix and verify</strong> — make sure the fix doesn't break anything else</li>
      </ol>

      <div class="callout best">
        <div class="callout-icon">🏆</div>
        <div class="callout-body"><strong>BEST PRACTICE</strong> Learn DevTools deeply. Breakpoints, watch expressions, the call stack, network tab — these are your power tools. Most developers only use <code>console.log</code>, which is like using a spoon to dig a foundation. Level up to proper breakpoints.</div>
      </div>
